<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<script>/* aplica tema salvo antes da pintura para evitar flash */
(function(){try{var t=localStorage.getItem('badare_theme');if(!t)t=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<title>Badare Nutrição Clínica</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0a0e13" />
<meta name="description" content="Badare Nutrição Clínica — gestão de atendimentos, conversões e entregas." />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Badare" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{
  --bg:#0a0e13;--bg-alt:#0f141b;--surface:#141b24;--surface-2:#1a232e;--surface-3:#212d3a;
  --border:rgba(255,255,255,0.07);--border-strong:rgba(255,255,255,0.12);
  --text:#eef2f6;--text-muted:rgba(238,242,246,0.55);--text-dim:rgba(238,242,246,0.38);
  --accent:#2ee6a6;--accent-2:#38bdf8;--accent-3:#a78bfa;--warn:#fbbf24;--danger:#f87171;--info:#38bdf8;
  --grad:linear-gradient(135deg,#2ee6a6 0%,#38bdf8 100%);
  --shadow:0 12px 40px rgba(0,0,0,0.45);--shadow-lg:0 24px 70px rgba(0,0,0,0.6);
  --radius:18px;--radius-sm:12px;--ease:cubic-bezier(0.19,1,0.22,1);
  --grid:rgba(255,255,255,0.05);--brand:#1E2126;
  color-scheme:dark;
}
[data-theme="light"]{
  --bg:#eef1f5;--bg-alt:#ffffff;--surface:#ffffff;--surface-2:#f1f4f8;--surface-3:#e6ebf1;
  --border:rgba(30,33,38,0.10);--border-strong:rgba(30,33,38,0.18);
  --text:#1E2126;--text-muted:rgba(30,33,38,0.60);--text-dim:rgba(30,33,38,0.40);
  --accent:#10b981;--accent-2:#0ea5e9;--accent-3:#8b5cf6;--warn:#d97706;--danger:#ef4444;--info:#0ea5e9;
  --grad:linear-gradient(135deg,#10b981 0%,#0ea5e9 100%);
  --shadow:0 12px 40px rgba(30,41,59,0.10);--shadow-lg:0 24px 70px rgba(30,41,59,0.16);
  --grid:rgba(30,33,38,0.07);
  color-scheme:light;
}
[data-theme="light"] body{background:radial-gradient(1100px 600px at 85% -10%,rgba(14,165,233,0.08),transparent 60%),radial-gradient(900px 500px at -10% 110%,rgba(16,185,129,0.08),transparent 55%),var(--bg)}
[data-theme="light"] .btn.primary,[data-theme="light"] .kpi-ico.ico-a,[data-theme="light"] .donut-center b{color:#04241a}
[data-theme="light"] input,[data-theme="light"] select,[data-theme="light"] textarea{color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
.brand .logo .brand-mark{width:24px;height:24px;color:#05221a}
body{font-family:'DM Sans',sans-serif;background:radial-gradient(1100px 600px at 85% -10%,rgba(56,189,248,0.10),transparent 60%),radial-gradient(900px 500px at -10% 110%,rgba(46,230,166,0.10),transparent 55%),var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:20px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:#26313e;background-clip:padding-box}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:6px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{position:sticky;top:0;height:100vh;background:linear-gradient(180deg,var(--bg-alt),rgba(15,20,27,0.4));border-right:1px solid var(--border);padding:26px 18px;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:12px;padding:4px 8px 22px}
.brand .logo{width:40px;height:40px;border-radius:12px;background:var(--grad);display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;color:#05221a;font-size:20px;box-shadow:0 6px 18px rgba(46,230,166,0.35)}
.brand h1{font-family:'Space Grotesk';font-size:18px;font-weight:600;letter-spacing:-0.01em}
.brand span{display:block;font-size:11px;color:var(--text-dim);letter-spacing:0.14em;text-transform:uppercase;margin-top:1px}
.nav-label{font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-dim);padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;color:var(--text-muted);font-size:14px;font-weight:500;cursor:pointer;transition:all .22s var(--ease);border:1px solid transparent;position:relative}
.nav-item svg{width:18px;height:18px;stroke-width:1.7;flex-shrink:0}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--surface-2);color:var(--text);border-color:var(--border-strong)}
.nav-item.active svg{color:var(--accent)}
.nav-item .badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10.5px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:grid;place-items:center;padding:0 5px}
.sidebar-foot{margin-top:auto;padding:14px 12px 4px;border-top:1px solid var(--border)}
.userchip{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#38bdf8);display:grid;place-items:center;font-weight:600;font-size:13px;color:#0a0e13}
.userchip small{display:block;color:var(--text-dim);font-size:11px}

/* MAIN */
.main{padding:24px 30px 50px;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.topbar .head{display:flex;align-items:center;gap:12px;min-width:0}
.topbar .head h2{font-family:'Space Grotesk';font-size:23px;font-weight:600;letter-spacing:-0.02em}
.topbar .head p{color:var(--text-muted);font-size:13.5px;margin-top:3px}
.menu-btn{display:none;width:42px;height:42px;border-radius:11px;background:var(--surface);border:1px solid var(--border);color:var(--text);place-items:center;cursor:pointer;flex-shrink:0}
.menu-btn svg{width:20px;height:20px}
.menu-btn:active{background:var(--surface-2)}
.nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);z-index:65;opacity:0;pointer-events:none;transition:opacity .3s var(--ease)}
.nav-overlay.open{opacity:1;pointer-events:auto}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search{position:relative}
.search input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 14px 10px 38px;border-radius:11px;font-family:inherit;font-size:13.5px;width:230px;transition:.25s var(--ease)}
.search input::placeholder{color:var(--text-dim)}
.search input:focus{border-color:var(--accent);width:260px}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-dim)}
.refdate{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:7px 12px;font-size:12.5px;color:var(--text-muted)}
.refdate svg{width:15px;height:15px;color:var(--accent)}
.refdate input{background:none;border:none;color:var(--text);font-family:inherit;font-size:12.5px;color-scheme:dark;cursor:pointer}
.btn-icon{position:relative;width:40px;height:40px;border-radius:11px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);display:grid;place-items:center;cursor:pointer;transition:.2s var(--ease)}
.btn-icon:hover{color:var(--text);border-color:var(--border-strong)}
.btn-icon svg{width:18px;height:18px}
.btn-icon .ndot{position:absolute;top:7px;right:8px;min-width:16px;height:16px;border-radius:8px;background:var(--danger);color:#fff;font-size:9.5px;font-weight:700;display:grid;place-items:center;padding:0 4px;border:2px solid var(--bg-alt)}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:500;padding:9px 14px;border-radius:11px;cursor:pointer;transition:.2s var(--ease)}
.btn:hover{border-color:var(--border-strong)}
.btn svg{width:15px;height:15px}
.btn.primary{background:var(--grad);color:#05221a;border:none;font-weight:600}
.btn.primary:hover{filter:brightness(1.06)}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:9px}
.btn.ghost{background:transparent}

.segment{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:4px;gap:2px}
.segment button{background:none;border:none;color:var(--text-muted);font-family:inherit;font-size:13px;font-weight:500;padding:7px 13px;border-radius:8px;cursor:pointer;transition:.2s var(--ease)}
.segment button:hover{color:var(--text)}
.segment button.active{background:var(--surface-2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
select.sel{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;padding:9px 12px;border-radius:11px;cursor:pointer;color-scheme:dark}
select.sel:focus{border-color:var(--accent)}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.kpi{background:linear-gradient(160deg,var(--surface),var(--bg-alt));border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;animation:rise .6s var(--ease) backwards}
.kpi::after{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;background:linear-gradient(160deg,rgba(255,255,255,.10),transparent 40%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.kpi-ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center}
.kpi-ico svg{width:19px;height:19px}
.ico-a{background:rgba(46,230,166,.13);color:var(--accent)}.ico-b{background:rgba(56,189,248,.13);color:var(--accent-2)}.ico-c{background:rgba(167,139,250,.14);color:var(--accent-3)}.ico-d{background:rgba(251,191,36,.13);color:var(--warn)}.ico-e{background:rgba(248,113,113,.13);color:var(--danger)}
.trend{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:4px 8px;border-radius:20px}
.trend.up{color:var(--accent);background:rgba(46,230,166,.10)}.trend.down{color:var(--danger);background:rgba(248,113,113,.10)}.trend.flat{color:var(--text-muted);background:var(--surface-2)}
.trend svg{width:13px;height:13px}
.kpi-val{font-family:'Space Grotesk';font-size:31px;font-weight:600;letter-spacing:-0.02em;line-height:1}
.kpi-label{color:var(--text-muted);font-size:13px;margin-top:7px}

/* PANELS */
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px;margin-top:18px}
.panel{background:linear-gradient(160deg,var(--surface),var(--bg-alt));border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;animation:rise .6s var(--ease) backwards;min-width:0}
.col-12{grid-column:span 12}.col-8{grid-column:span 8}.col-7{grid-column:span 7}.col-6{grid-column:span 6}.col-5{grid-column:span 5}.col-4{grid-column:span 4}.col-3{grid-column:span 3}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}
.panel-head h3{font-family:'Space Grotesk';font-size:15.5px;font-weight:600;letter-spacing:-0.01em}
.panel-head p{font-size:12px;color:var(--text-dim);margin-top:2px}
.legend{display:flex;gap:14px;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)}
.dot{width:9px;height:9px;border-radius:3px;display:inline-block}
.chart-wrap{position:relative;width:100%}
.h-200{height:200px}.h-240{height:240px}.h-280{height:280px}.h-300{height:300px}.h-320{height:320px}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-center b{font-family:'Space Grotesk';font-size:26px;font-weight:600}
.donut-center small{color:var(--text-muted);font-size:12px;margin-top:2px}

/* barlist */
.barlist{display:flex;flex-direction:column;gap:14px}
.barrow .barrow-top{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:7px}
.barrow-top b{font-weight:500}.barrow-top span{color:var(--text-muted);font-variant-numeric:tabular-nums}
.track{height:8px;background:var(--surface-2);border-radius:20px;overflow:hidden}
.fill{height:100%;border-radius:20px;width:0;transition:width 1.1s var(--ease)}

/* table */
.tbl-wrap{overflow-x:auto;margin:0 -6px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;color:var(--text-dim);font-weight:500;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;padding:0 14px 12px;white-space:nowrap;cursor:default}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--text-muted)}
td{padding:13px 14px;border-top:1px solid var(--border);white-space:nowrap}
tbody tr{transition:.15s var(--ease);cursor:pointer}
tbody tr:hover{background:var(--surface-2)}
.cell-strong{font-weight:500}.muted{color:var(--text-muted)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.pill.ok{color:var(--accent);background:rgba(46,230,166,.10)}
.pill.neg{color:var(--danger);background:rgba(248,113,113,.10)}
.pill.mid{color:var(--warn);background:rgba(251,191,36,.10)}
.pill.info{color:var(--accent-2);background:rgba(56,189,248,.10)}
.pill.purple{color:var(--accent-3);background:rgba(167,139,250,.12)}
.pill.gray{color:var(--text-muted);background:var(--surface-2)}
.pill .pdot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* pagination */
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:16px;gap:12px;flex-wrap:wrap}
.pager .info{font-size:12.5px;color:var(--text-muted)}
.pager .pages{display:flex;gap:5px}
.pager button{min-width:34px;height:34px;border-radius:9px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-size:13px;transition:.15s var(--ease)}
.pager button:hover:not(:disabled){color:var(--text);border-color:var(--border-strong)}
.pager button.active{background:var(--surface-2);color:var(--text);border-color:var(--border-strong)}
.pager button:disabled{opacity:.4;cursor:default}

/* filters bar */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}

/* alert cards / returns */
.alert-card{display:flex;gap:14px;align-items:flex-start;padding:15px 16px;border-radius:14px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--text-dim);transition:.18s var(--ease)}
.alert-card:hover{border-color:var(--border-strong);background:var(--surface-2)}
.alert-card.late{border-left-color:var(--danger)}
.alert-card.today{border-left-color:var(--warn)}
.alert-card.soon{border-left-color:var(--accent-2)}
.alert-card.done{opacity:.5}
.alert-ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex-shrink:0}
.alert-ico svg{width:18px;height:18px}
.alert-body{flex:1;min-width:0}
.alert-body h4{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.alert-body p{font-size:12.5px;color:var(--text-muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert-actions{display:flex;gap:7px;flex-shrink:0;align-items:center}
.iconbtn{width:32px;height:32px;border-radius:9px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);display:grid;place-items:center;cursor:pointer;transition:.15s var(--ease)}
.iconbtn:hover{color:var(--text);border-color:var(--border-strong)}
.iconbtn.wa:hover{color:#25D366;border-color:rgba(37,211,102,.4)}
.iconbtn.check:hover{color:var(--accent);border-color:rgba(46,230,166,.4)}
.iconbtn svg{width:15px;height:15px}
.returns-list{display:flex;flex-direction:column;gap:11px;max-height:560px;overflow-y:auto;padding-right:4px}

/* client cards */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.client-card{background:linear-gradient(160deg,var(--surface),var(--bg-alt));border:1px solid var(--border);border-radius:16px;padding:18px;transition:.18s var(--ease);cursor:pointer}
.client-card:hover{border-color:var(--border-strong);transform:translateY(-2px)}
.client-card .top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.client-card .av{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-weight:600;font-size:15px;flex-shrink:0;color:#0a0e13}
.client-card h4{font-size:14.5px;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.client-card .sub{font-size:12px;color:var(--text-dim);margin-top:2px}
.client-card .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.client-card .stat{background:var(--surface-2);border-radius:10px;padding:9px 10px;text-align:center}
.client-card .stat b{display:block;font-family:'Space Grotesk';font-size:16px;font-weight:600}
.client-card .stat small{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em}
.client-card .foot{margin-top:13px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-muted)}

/* drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:.3s var(--ease);z-index:60}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(440px,92vw);background:var(--bg-alt);border-left:1px solid var(--border-strong);box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .35s var(--ease);z-index:61;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:22px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.drawer-head h3{font-family:'Space Grotesk';font-size:18px;font-weight:600}
.drawer-head p{font-size:12.5px;color:var(--text-muted);margin-top:3px}
.drawer-body{padding:22px 24px;overflow-y:auto;flex:1}
.dfield{display:flex;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.dfield .k{color:var(--text-muted)}
.dfield .v{font-weight:500;text-align:right}
.drawer-foot{padding:18px 24px;border-top:1px solid var(--border);display:flex;gap:10px}

/* toast */
.toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:80}
.toast{display:flex;align-items:center;gap:11px;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:12px;padding:13px 16px;box-shadow:var(--shadow);font-size:13.5px;min-width:260px;animation:toastIn .4s var(--ease);border-left:3px solid var(--accent)}
.toast svg{width:18px;height:18px;color:var(--accent);flex-shrink:0}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* notif dropdown */
.notif-wrap{position:relative}
.notif-panel{position:absolute;top:50px;right:0;width:340px;background:var(--bg-alt);border:1px solid var(--border-strong);border-radius:16px;box-shadow:var(--shadow-lg);padding:8px;z-index:50;opacity:0;pointer-events:none;transform:translateY(-8px);transition:.22s var(--ease)}
.notif-panel.open{opacity:1;pointer-events:auto;transform:translateY(0)}
.notif-panel .nhead{display:flex;justify-content:space-between;align-items:center;padding:10px 12px 8px}
.notif-panel .nhead b{font-family:'Space Grotesk';font-size:14px}
.notif-item{display:flex;gap:11px;padding:11px 12px;border-radius:11px;cursor:pointer;transition:.15s var(--ease)}
.notif-item:hover{background:var(--surface)}
.notif-item .nd{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.notif-item h5{font-size:13px;font-weight:500}
.notif-item small{font-size:11.5px;color:var(--text-muted)}

/* KANBAN */
.kanban{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(290px,1fr);gap:16px;overflow-x:auto;padding:4px 4px 16px;align-items:start}
.kcol{background:var(--bg-alt);border:1px solid var(--border);border-radius:16px;padding:14px;min-height:200px;display:flex;flex-direction:column;transition:.18s var(--ease)}
.kcol.dragover{border-color:var(--accent);background:rgba(46,230,166,.04)}
.kcol-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;padding:2px 4px}
.kcol-head .lt{display:flex;align-items:center;gap:9px}
.kcol-head .kdot{width:9px;height:9px;border-radius:50%}
.kcol-head h4{font-family:'Space Grotesk';font-size:14px;font-weight:600}
.kcol-head .kcount{background:var(--surface-2);color:var(--text-muted);font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:20px}
.kcol-head .ksum{font-size:11px;color:var(--text-dim);margin-top:2px}
.kcards{display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:62vh;padding:2px}
.kcard{background:linear-gradient(160deg,var(--surface),var(--bg-alt));border:1px solid var(--border);border-left:3px solid var(--text-dim);border-radius:13px;padding:13px 14px;cursor:grab;transition:.16s var(--ease);position:relative}
.kcard:hover{border-color:var(--border-strong);transform:translateY(-2px);box-shadow:var(--shadow)}
.kcard:active{cursor:grabbing}
.kcard.dragging{opacity:.4}
.kcard.late{border-left-color:var(--danger)}.kcard.today{border-left-color:var(--warn)}.kcard.soon{border-left-color:var(--accent-2)}
.kcard .ktop{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.kcard .kav{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-weight:600;font-size:12.5px;color:#0a0e13;flex-shrink:0}
.kcard h5{font-size:13.5px;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kcard .kloc{font-size:11px;color:var(--text-dim);margin-top:1px}
.kcard .kprod{font-size:12.5px;color:var(--text-muted);margin-bottom:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kcard .kmeta{display:flex;align-items:center;justify-content:space-between;gap:8px}
.kcard .kactions{display:flex;gap:6px}
.kbadge{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:20px}
.kbadge.late{color:var(--danger);background:rgba(248,113,113,.12)}.kbadge.today{color:var(--warn);background:rgba(251,191,36,.12)}.kbadge.soon{color:var(--accent-2);background:rgba(56,189,248,.12)}
.kcard .ksm{width:28px;height:28px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);display:grid;place-items:center;cursor:pointer;transition:.15s var(--ease)}
.kcard .ksm:hover{color:var(--text);border-color:var(--border-strong)}
.kcard .ksm.wa:hover{color:#25D366}.kcard .ksm.ok:hover{color:var(--accent)}
.kcard .ksm svg{width:14px;height:14px}
.kcol-empty{text-align:center;color:var(--text-dim);font-size:12.5px;padding:30px 10px;border:1.5px dashed var(--border);border-radius:12px}

/* insights */
.insights{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.insight{background:var(--surface-2);border-radius:13px;padding:15px 16px;border-left:3px solid var(--accent)}
.insight.warn{border-left-color:var(--warn)}.insight.danger{border-left-color:var(--danger)}.insight.info{border-left-color:var(--accent-2)}.insight.purple{border-left-color:var(--accent-3)}
.insight .ih{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.insight .ih svg{width:14px;height:14px}
.insight b{font-family:'Space Grotesk';font-size:21px;font-weight:600;display:block;line-height:1.1}
.insight p{font-size:12.5px;color:var(--text-muted);margin-top:5px;line-height:1.45}

/* ranked list */
.ranklist{display:flex;flex-direction:column}
.rankrow{display:flex;align-items:center;gap:12px;padding:11px 6px;border-top:1px solid var(--border)}
.rankrow:first-child{border-top:none}
.rankrow .rnum{width:24px;height:24px;border-radius:7px;background:var(--surface-2);display:grid;place-items:center;font-size:12px;font-weight:600;color:var(--text-muted);flex-shrink:0}
.rankrow .rav{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-weight:600;font-size:12px;color:#0a0e13;flex-shrink:0}
.rankrow .rbody{flex:1;min-width:0}
.rankrow .rbody h5{font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rankrow .rbody small{font-size:11.5px;color:var(--text-dim)}
.rankrow .rval{font-family:'Space Grotesk';font-weight:600;font-size:14px}

/* FORM */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.field{display:flex;flex-direction:column;gap:6px;min-width:0}
.field.full{grid-column:1/-1}
.field label{font-size:12.5px;color:var(--text-muted);font-weight:500}
.field label .req{color:var(--danger);margin-left:2px}
.field input,.field select,.field textarea{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13.5px;padding:10px 12px;border-radius:10px;color-scheme:dark;width:100%;transition:.15s var(--ease)}
.field input::placeholder,.field textarea::placeholder{color:var(--text-dim)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);outline:none}
.field textarea{resize:vertical;min-height:82px}
.field .err{font-size:11.5px;color:var(--danger);display:none}
.field.invalid input,.field.invalid select{border-color:var(--danger)}
.field.invalid .err{display:block}
.check-row{display:flex;flex-wrap:wrap;gap:8px}
.check{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 13px;font-size:13px;color:var(--text-muted);cursor:pointer;transition:.15s var(--ease)}
.check:hover{border-color:var(--border-strong);color:var(--text)}
.check input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.check:has(input:checked){border-color:var(--accent);color:var(--text);background:rgba(46,230,166,.07)}
.form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:6px}
.mode-banner{display:flex;align-items:center;gap:10px;padding:12px 15px;border-radius:12px;font-size:13px;margin-bottom:18px;border:1px solid var(--border);line-height:1.4}
.mode-banner.local{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.22);color:var(--warn)}
.mode-banner.cloud{background:rgba(46,230,166,.07);border-color:rgba(46,230,166,.22);color:var(--accent)}
.mode-banner svg{width:17px;height:17px;flex-shrink:0}
.help-list{display:flex;flex-direction:column;gap:12px}
.help-list .hi{display:flex;gap:11px;font-size:13px;color:var(--text-muted);line-height:1.45}
.help-list .hi svg{width:16px;height:16px;color:var(--accent);flex-shrink:0;margin-top:2px}

/* misc */
.section-title{font-family:'Space Grotesk';font-size:16px;font-weight:600;margin:4px 0 14px;display:flex;align-items:center;gap:10px}
.section-title .cnt{font-size:12px;color:var(--text-muted);font-family:'DM Sans';font-weight:400}
.empty{text-align:center;padding:50px 20px;color:var(--text-dim)}
.empty svg{width:42px;height:42px;margin-bottom:12px;opacity:.5}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:4px}
.mini-stat{background:var(--surface-2);border-radius:12px;padding:14px 16px}
.mini-stat b{display:block;font-family:'Space Grotesk';font-size:22px;font-weight:600}
.mini-stat small{font-size:12px;color:var(--text-muted)}
.view{animation:fade .4s var(--ease)}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:1180px){.kpis{grid-template-columns:repeat(2,1fr)}.col-8,.col-7,.col-6,.col-5,.col-4,.col-3{grid-column:span 12}.stat-strip{grid-template-columns:repeat(2,1fr)}}
/* tablet/mobile: sidebar vira gaveta deslizante */
@media(max-width:920px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;height:100dvh;width:264px;z-index:70;transform:translateX(-100%);transition:transform .3s var(--ease);border-right:1px solid var(--border-strong)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-lg)}
  .menu-btn{display:grid}
  .main{padding:18px 18px 60px}
  .form-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .kpis{grid-template-columns:1fr}
  .topbar{gap:12px}
  .topbar .head h2{font-size:20px}
  .topbar .head p{display:none}
  .toolbar{width:100%;justify-content:flex-start}
  .search{flex:1;min-width:0}
  .search input{width:100%}
  .search input:focus{width:100%}
  .btn.primary#btnNovo span,#btnNovo{padding:9px 12px}
  .panel{padding:16px}
  .insights{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:1fr}
  .drawer{width:100vw}
}
@media(max-width:380px){.stat-strip{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* THEME TOGGLE ICON */
.btn-icon svg{width:18px;height:18px}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:24px;background:radial-gradient(900px 500px at 80% -10%,rgba(56,189,248,0.12),transparent 60%),radial-gradient(800px 450px at -10% 110%,rgba(46,230,166,0.12),transparent 55%),var(--bg);overflow-y:auto}
.login-screen.show{display:flex}
.login-card{width:100%;max-width:400px;background:linear-gradient(160deg,var(--surface),var(--bg-alt));border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow-lg);padding:34px 30px;animation:rise .5s var(--ease)}
.login-logo{width:60px;height:60px;border-radius:16px;background:var(--grad);display:grid;place-items:center;margin:0 auto 18px;box-shadow:0 8px 24px rgba(46,230,166,.32)}
.login-logo svg{width:36px;height:36px;color:#05221a}
.login-card h2{font-family:'Space Grotesk';font-size:21px;font-weight:600;text-align:center;letter-spacing:-0.01em}
.login-card .sub{text-align:center;color:var(--text-muted);font-size:13px;margin-top:5px;margin-bottom:24px}
.login-card .field{margin-bottom:14px}
.login-err{display:none;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--danger);font-size:12.5px;padding:10px 13px;border-radius:10px;margin-bottom:14px}
.login-err.show{display:block}
.login-card .btn.primary{width:100%;justify-content:center;padding:12px;font-size:14px;margin-top:4px}
.login-hint{text-align:center;font-size:11.5px;color:var(--text-dim);margin-top:18px;line-height:1.5}

/* USERS / ROLE */
.role-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.role-pill.admin{color:var(--accent-3);background:rgba(167,139,250,.14)}
.role-pill.op{color:var(--accent-2);background:rgba(56,189,248,.12)}
.foot-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:11px 12px}
.foot-card .userchip{margin-bottom:0}
.foot-actions{display:flex;gap:7px;margin-top:11px}
.foot-actions button{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);font-family:inherit;font-size:12px;font-weight:500;padding:8px;border-radius:9px;cursor:pointer;transition:.15s var(--ease)}
.foot-actions button:hover{color:var(--text);border-color:var(--border-strong)}
.foot-actions button.logout:hover{color:var(--danger);border-color:rgba(248,113,113,.4)}
.foot-actions button svg{width:14px;height:14px}
.u-actions{display:flex;gap:7px}
</style>
</head>
